<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام ترحيل القيود المحاسبية</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --border: #334155;
    --border-light: #475569;
    --accent: #f59e0b;
    --blue: #3b82f6;
    --green: #22c55e;
    --red: #ef4444;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --radius: 12px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans Arabic', sans-serif;
    min-height: 100vh;
    padding: 2rem 1rem;
    line-height: 1.6;
  }

  .wrapper { max-width: 860px; margin: 0 auto; }

  /* Top bar */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 1rem;
  }
  .topbar h1 { font-size: 1.35rem; font-weight: 700; }
  .topbar p  { font-size: 0.82rem; color: var(--muted); margin-top: 2px; }
  .status-pill {
    display: flex; align-items: center; gap: 7px;
    background: rgba(34,197,94,0.08);
    border: 1px solid rgba(34,197,94,0.25);
    padding: 6px 14px; border-radius: 999px;
    font-size: 0.78rem; color: var(--green);
    font-family: 'JetBrains Mono', monospace;
    white-space: nowrap;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: blink 2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

  /* URL bar */
  .url-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    margin-bottom: 1.25rem;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .url-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem; font-weight: 700;
    color: var(--accent);
    background: rgba(245,158,11,0.1);
    border: 1px solid rgba(245,158,11,0.2);
    padding: 3px 9px; border-radius: 6px;
    white-space: nowrap;
  }
  .url-bar input {
    flex: 1; min-width: 200px;
    background: transparent; border: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.88rem; color: var(--blue); outline: none;
  }
  .url-bar input::placeholder { color: var(--border-light); }
  .test-btn {
    background: rgba(59,130,246,0.08);
    border: 1px solid rgba(59,130,246,0.25);
    color: var(--blue); padding: 6px 14px;
    border-radius: 8px; font-size: 0.78rem;
    cursor: pointer; font-family: 'JetBrains Mono', monospace;
    transition: background 0.2s; white-space: nowrap;
  }
  .test-btn:hover { background: rgba(59,130,246,0.18); }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-bottom: 1.25rem;
  }
  .card-title {
    font-size: 0.78rem; font-weight: 700;
    color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.07em; margin-bottom: 1.25rem;
    display: flex; align-items: center; gap: 8px;
  }
  .card-title::before {
    content:''; width:3px; height:14px;
    background: var(--accent); border-radius: 2px;
  }

  /* Upload */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 10px; padding: 2.5rem 1.5rem;
    text-align: center; cursor: pointer;
    transition: all 0.2s;
  }
  .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: rgba(245,158,11,0.03); }
  .upload-zone.has-file { border-color: var(--green); border-style: solid; background: rgba(34,197,94,0.03); }
  .upload-zone .ico { font-size: 2rem; margin-bottom: 0.5rem; }
  .upload-zone p { color: var(--muted); font-size: 0.87rem; }
  .upload-zone strong { color: var(--text); }
  .file-ok { color: var(--green) !important; font-weight: 600; font-size: 0.95rem !important; }

  /* Table preview */
  .tbl-wrap {
    margin-top: 1rem; border-radius: 8px;
    border: 1px solid var(--border);
    max-height: 210px; overflow: auto; display: none;
  }
  table { width: 100%; border-collapse: collapse; font-size: 0.77rem; }
  th {
    background: #0f172a; padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
    color: var(--accent); font-weight: 600; white-space: nowrap;
  }
  td { padding: 7px 12px; border-bottom: 1px solid var(--border); color: var(--muted); text-align: center; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { color: var(--text); background: rgba(255,255,255,0.02); }

  /* Form */
  .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .field label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--muted); margin-bottom: 7px; }

  input[type="text"], input[type="number"] {
    width: 100%; padding: 11px 14px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 9px; color: var(--text);
    font-family: inherit; font-size: 0.9rem;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
  input::placeholder { color: var(--border-light); }
  .mono { font-family: 'JetBrains Mono', monospace !important; }

  .bal-row {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 9px; padding: 11px 14px; height: 44px;
  }
  .bal-dot { width: 9px; height: 9px; border-radius: 50%; transition: background 0.3s; }

  hr.div { border: none; border-top: 1px solid var(--border); margin: 1.1rem 0; }

  /* Buttons */
  .btn-submit {
    width: 100%; padding: 14px;
    background: var(--accent); color: #000;
    border: none; border-radius: 10px;
    font-weight: 700; font-size: 1rem; font-family: inherit;
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; gap: 10px;
    transition: all 0.2s; margin-top: 1.25rem;
  }
  .btn-submit:hover:not(:disabled) { background: #d97706; transform: translateY(-1px); }
  .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-dl {
    width: 100%; padding: 13px;
    background: transparent; color: var(--green);
    border: 1.5px solid var(--green);
    border-radius: 10px; font-weight: 700; font-size: 0.95rem;
    font-family: inherit; cursor: pointer;
    display: none; align-items: center; justify-content: center; gap: 10px;
    text-decoration: none; margin-top: 0.85rem;
    transition: all 0.2s; animation: pop 0.35s ease;
  }
  .btn-dl:hover { background: rgba(34,197,94,0.08); }
  .btn-dl.show { display: flex; }
  @keyframes pop { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

  /* Alert */
  .alert {
    margin-top: 1rem; padding: 1rem 1.25rem;
    border-radius: 10px; display: none;
    font-size: 0.87rem; animation: pop 0.3s ease;
  }
  .alert.show { display: block; }
  .alert-ok  { background: rgba(34,197,94,0.07);  border: 1px solid rgba(34,197,94,0.22);  color: #86efac; }
  .alert-err { background: rgba(239,68,68,0.07);  border: 1px solid rgba(239,68,68,0.22);  color: #fca5a5; }
  .alert strong { display: block; margin-bottom: 4px; }
  .alert-body { font-family: 'JetBrains Mono', monospace; font-size: 0.73rem; white-space: pre-wrap; margin-top: 5px; opacity: 0.8; }

  /* Spinner */
  .spinner {
    width: 17px; height: 17px;
    border: 2.5px solid rgba(0,0,0,0.2);
    border-top-color: #000; border-radius: 50%;
    animation: spin 0.75s linear infinite; display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 540px) { .g2 { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="wrapper">

  <div class="topbar">
    <div>
      <h1>نظام ترحيل القيود المحاسبية</h1>
      <p>رفع ملف Excel → ترحيل القيد → تحميل الملف المحدَّث</p>
    </div>
    <div class="status-pill"><span class="dot"></span>Railway Backend</div>
  </div>

  <div class="url-bar">
    <span class="url-label">API URL</span>
    <input id="apiUrl" type="text" placeholder="https://xxxx.up.railway.app">
    <button class="test-btn" onclick="testConn()">اختبار الاتصال</button>
  </div>

  <div class="card">
    <div class="card-title">الخطوة ١ — رفع ملف Excel</div>
    <div class="upload-zone" id="dropZone">
      <input type="file" id="fi" accept=".xlsx,.xls" hidden>
      <div id="uHint">
        <div class="ico">📂</div>
        <p><strong>اسحب ملف هنا</strong> أو انقر للاختيار</p>
      </div>
      <div id="uDone" style="display:none">
        <div class="ico">✅</div>
        <p class="file-ok" id="fName"></p>
      </div>
    </div>
    <div class="tbl-wrap" id="tblWrap">
      <table><thead id="tH"></thead><tbody id="tB"></tbody></table>
    </div>
  </div>

  <div class="card">
    <div class="card-title">الخطوة ٢ — بيانات القيد</div>
    <div class="g2" style="margin-bottom:1rem">
      <div class="field">
        <label>تاريخ القيد</label>
        <input type="text" id="date" placeholder="DD/MM/YYYY" class="mono">
      </div>
      <div class="field">
        <label>حالة الميزان</label>
        <div class="bal-row">
          <span id="balTxt" style="font-size:.85rem;font-weight:600;color:var(--red)">غير متزن</span>
          <span class="bal-dot" id="balDot" style="background:var(--red)"></span>
        </div>
      </div>
    </div>

    <hr class="div">

    <div class="g2" style="margin-bottom:1rem">
      <div class="field">
        <label>كود الحساب المدين</label>
        <input type="text" id="code" placeholder="302001028" class="mono">
      </div>
      <div class="field">
        <label>المبلغ المدين</label>
        <input type="number" id="dept" step="0.01" placeholder="0.00" class="mono">
      </div>
    </div>

    <div class="g2">
      <div class="field">
        <label>كود الحساب الدائن</label>
        <input type="text" id="code2" placeholder="102003001" class="mono">
      </div>
      <div class="field">
        <label>المبلغ الدائن</label>
        <input type="number" id="cash" step="0.01" placeholder="0.00" class="mono">
      </div>
    </div>
  </div>

  <button class="btn-submit" id="subBtn" onclick="doSubmit()">
    <span class="spinner" id="spin"></span>
    <span id="btnLbl">▶ تنفيذ الترحيل وتحميل الملف</span>
  </button>

  <a class="btn-dl" id="dlBtn" download>⬇ تحميل الملف المعالج</a>

  <div class="alert" id="alertBox">
    <strong id="aTitle"></strong>
    <div class="alert-body" id="aBody"></div>
  </div>

</div>

<script>
  let file = null;
  const urlEl = document.getElementById('apiUrl');

  // Persistence
  const saved = localStorage.getItem('railwayUrl');
  if (saved) urlEl.value = saved;
  urlEl.oninput = () => localStorage.setItem('railwayUrl', urlEl.value.trim());

  // File logic
  const drop = document.getElementById('dropZone');
  const fi = document.getElementById('fi');
  drop.onclick = () => fi.click();
  drop.ondragover = e => { e.preventDefault(); drop.classList.add('drag'); };
  drop.ondragleave = () => drop.classList.remove('drag');
  drop.ondrop = e => { e.preventDefault(); drop.classList.remove('drag'); if (e.dataTransfer.files[0]) pick(e.dataTransfer.files[0]); };
  fi.onchange = e => { if (e.target.files[0]) pick(e.target.files[0]); };

  function pick(f) {
    file = f;
    document.getElementById('uHint').style.display = 'none';
    document.getElementById('uDone').style.display = 'block';
    document.getElementById('fName').textContent = '📄 ' + f.name;
    drop.classList.add('has-file');
    hideAlert();
    preview(f);
  }

  function preview(f) {
    const r = new FileReader();
    r.onload = ev => {
      const wb = XLSX.read(new Uint8Array(ev.target.result), { type:'array' });
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header:1 });
      const wrap = document.getElementById('tblWrap');
      const th = document.getElementById('tH');
      const tb = document.getElementById('tB');
      th.innerHTML = tb.innerHTML = '';
      if (!rows.length) return;
      wrap.style.display = 'block';
      const hr = document.createElement('tr');
      (rows[0]||[]).forEach(c=>{ const el=document.createElement('th'); el.textContent=c??''; hr.appendChild(el); });
      th.appendChild(hr);
      rows.slice(1,6).forEach(row=>{
        const tr=document.createElement('tr');
        row.forEach(c=>{ const td=document.createElement('td'); td.textContent=c??''; tr.appendChild(td); });
        tb.appendChild(tr);
      });
    };
    r.readAsArrayBuffer(f);
  }

  function chkBal() {
    const d = parseFloat(document.getElementById('dept').value)||0;
    const c = parseFloat(document.getElementById('cash').value)||0;
    const ok = d > 0 && Math.abs(d-c) < 0.001;
    document.getElementById('balTxt').textContent = ok ? 'متزن ✓' : 'غير متزن';
    document.getElementById('balTxt').style.color = ok ? 'var(--green)' : 'var(--red)';
    document.getElementById('balDot').style.background = ok ? 'var(--green)' : 'var(--red)';
  }
  document.getElementById('dept').oninput = chkBal;
  document.getElementById('cash').oninput = chkBal;

  function getBase() { 
    let val = urlEl.value.trim();
    return val.endsWith('/') ? val.slice(0, -1) : val;
  }

  async function testConn() {
    const base = getBase();
    if (!base) return showAlert('err','تنبيه','يرجى إدخال الرابط أولاً');
    try {
      // نختبر المسار الرئيسي بدلاً من /docs لأنه قد يكون معطلاً
      const r = await fetch(base + '/', { method: 'GET' });
      if (r.ok || r.status === 404) { // 404 تعني أن السيرفر وصل لكن المسار / غير معرف، وهذا جيد
         showAlert('ok','اتصال ناجح','السيرفر مستجيب');
      } else {
         showAlert('err','فشل','الخادم أعاد حالة: ' + r.status);
      }
    } catch(e) {
      showAlert('err','خطأ في الاتصال','تأكد من الرابط أو تشغيل السيرفر');
    }
  }

  async function doSubmit() {
    const base = getBase();
    if (!base) return showAlert('err','نقص في البيانات','يرجى إدخال رابط الـ API');
    if (!file) return showAlert('err','نقص في البيانات','يرجى رفع ملف Excel');

    const fd = new FormData();
    fd.append('file', file);
    fd.append('date', document.getElementById('date').value.trim());
    fd.append('code', document.getElementById('code').value.trim());
    fd.append('code_2', document.getElementById('code2').value.trim()); // مطابقة للـ Python
    fd.append('dept', document.getElementById('dept').value); // المبلغ المدين
    fd.append('cash', document.getElementById('cash').value); // المبلغ الدائن

    setLoading(true);
    hideAlert();

    try {
      const res = await fetch(base + '/entry', { method:'POST', body:fd });

      if (res.ok) {
        const blob = await res.blob();
        const dl = document.getElementById('dlBtn');
        dl.href = URL.createObjectURL(blob);
        dl.download = "processed_" + file.name;
        dl.classList.add('show');
        showAlert('ok','تمت العملية','تم ترحيل القيود بنجاح، يمكنك التحميل الآن.');
      } else {
        const errData = await res.json();
        showAlert('err','خطأ من السيرفر', errData.detail || 'حدث خطأ غير معروف');
      }
    } catch (e) {
      showAlert('err','فشل الإرسال','تعذر الوصول للسيرفر. تأكد من تفعيل CORS.');
    } finally {
      setLoading(false);
    }
  }

  function setLoading(on) {
    document.getElementById('subBtn').disabled = on;
    document.getElementById('spin').style.display = on ? 'block' : 'none';
    document.getElementById('btnLbl').textContent = on ? 'جاري المعالجة...' : '▶ تنفيذ الترحيل وتحميل الملف';
  }

  function showAlert(type, title, body) {
    const b = document.getElementById('alertBox');
    b.className = 'alert show alert-' + (type==='ok'?'ok':'err');
    document.getElementById('aTitle').textContent = title;
    document.getElementById('aBody').textContent = body;
  }

  function hideAlert() { document.getElementById('alertBox').className = 'alert'; }
</script>
</body>
</html>
