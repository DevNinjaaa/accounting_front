<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام ترحيل القيود الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-main: #f1f5f9;
            --bg-card: #ffffff;
            --border: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --success: #10b981;
            --error: #ef4444;
            --radius: 16px;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-main);
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            color: var(--text-main);
            line-height: 1.6;
            padding: 2rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--bg-card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin: 0 auto;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        /* Header */
        .header {
            padding: 2rem;
            background: #1e293b;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 1.4rem; font-weight: 700; }
        .method-tag {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(255,255,255,0.15);
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
        }

        /* Config Bar */
        .url-config {
            padding: 1rem 2rem;
            background: #f8fafc;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .url-config label { font-size: 0.75rem; font-weight: 800; color: var(--text-muted); }
        .url-config input {
            flex: 1;
            background: transparent;
            border: none;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: var(--primary);
            outline: none;
        }

        .form-content { padding: 2rem; }

        .section-title {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin: 1.5rem 0 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
        }
        .section-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }

        /* Upload Zone */
        .upload-area {
            border: 2px dashed var(--border);
            padding: 2.5rem;
            text-align: center;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: #fafafa;
        }
        .upload-area:hover { border-color: var(--primary); background: #f0f7ff; }
        .upload-area.active { border-color: var(--success); background: #ecfdf5; }

        /* Table Container */
        #tableWrapper {
            margin-top: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            max-height: 300px;
            overflow: auto;
            display: none;
        }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { background: #f1f5f9; padding: 12px; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid var(--border); }
        td { padding: 10px; border-bottom: 1px solid var(--border); text-align: center; }

        /* Form Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 1.5rem; }
        .input-box label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; }
        
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
            font-family: inherit;
            transition: all 0.2s;
        }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37,99,235,0.1); }
        .mono { font-family: 'JetBrains Mono', monospace !important; }

        /* Balance Badge */
        .balance-badge {
            background: #f8fafc;
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.2s;
            border: none;
            font-size: 1rem;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-download { 
            background: var(--success); 
            color: white; 
            margin-top: 1rem; 
            text-decoration: none; 
            display: none; 
        }

        /* Notifications */
        .alert {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 10px;
            display: none;
            font-size: 0.9rem;
        }
        .alert-success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

        .loader {
            width: 18px; height: 18px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <header class="header">
        <h1>إدخال وترحيل القيود المحاسبية</h1>
        <span class="method-tag">POST /entry</span>
    </header>

    <div class="url-config">
        <label>BACKEND URL</label>
        <input id="apiUrl" type="text" value="http://localhost:8080" class="mono">
    </div>

    <main class="form-content">
        <div class="section-title">رفع البيانات</div>
        <div class="upload-area" id="dropZone">
            <input type="file" id="fileInput" accept=".xlsx,.xls" hidden>
            <div id="promptText">
                <p><strong>اسحب ملف Excel هنا</strong> أو انقر للاختيار</p>
                <p style="font-size: 0.8rem; color: var(--text-muted);">يدعم ملفات .xlsx فقط</p>
            </div>
            <div id="fileSelected" style="display:none; color: var(--primary); font-weight: 700;"></div>
        </div>

        <div id="tableWrapper">
            <table id="excelTable">
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div class="section-title">تفاصيل القيد المحاسبي</div>
        
        <div class="grid">
            <div class="input-box">
                <label>تاريخ القيد</label>
                <input type="text" id="date" placeholder="YYYY-MM-DD" class="mono">
            </div>
            <div class="input-box">
                <label>ميزان القيد</label>
                <div class="balance-badge" id="balanceStatus">
                    <span id="balanceText" style="color: var(--error)">غير متزن</span>
                    <div id="balanceDot" style="width:10px; height:10px; border-radius:50%; background: var(--error)"></div>
                </div>
            </div>
        </div>

        <div class="grid">
            <div class="input-box">
                <label>كود الحساب (مدين)</label>
                <input type="text" id="code" placeholder="مثال: 302001028" class="mono">
            </div>
            <div class="input-box">
                <label>المبلغ المدين</label>
                <input type="number" id="dept" step="0.01" placeholder="0.00" class="mono">
            </div>
        </div>

        <div class="grid">
            <div class="input-box">
                <label>كود الحساب (دائن)</label>
                <input type="text" id="code2" placeholder="مثال: 102003001" class="mono">
            </div>
            <div class="input-box">
                <label>المبلغ الدائن</label>
                <input type="number" id="cash" step="0.01" placeholder="0.00" class="mono">
            </div>
        </div>

        <button class="btn btn-primary" id="submitBtn" onclick="handleSubmission()">
            <div class="loader" id="loader"></div>
            <span id="btnLabel">تنفيذ عملية الترحيل</span>
        </button>

        <a id="downloadBtn" class="btn btn-download">⬇ تحميل الملف المعالج</a>

        <div id="responseAlert" class="alert">
            <strong id="alertTitle"></strong>
            <p id="alertMsg" style="font-size: 0.8rem; margin-top: 5px;"></p>
        </div>
    </main>
</div>

<script>
    const state = {
        file: null,
        isBalanced: false
    };

    // UI Elements
    const elements = {
        fileInput: document.getElementById('fileInput'),
        dropZone: document.getElementById('dropZone'),
        dept: document.getElementById('dept'),
        cash: document.getElementById('cash'),
        submitBtn: document.getElementById('submitBtn'),
        downloadBtn: document.getElementById('downloadBtn'),
        alert: document.getElementById('responseAlert')
    };

    // 1. File Handling
    elements.dropZone.onclick = () => elements.fileInput.click();
    
    elements.dropZone.ondragover = (e) => { e.preventDefault(); elements.dropZone.classList.add('active'); };
    elements.dropZone.ondragleave = () => elements.dropZone.classList.remove('active');
    
    elements.dropZone.ondrop = (e) => {
        e.preventDefault();
        elements.dropZone.classList.remove('active');
        if (e.dataTransfer.files.length) processFile(e.dataTransfer.files[0]);
    };

    elements.fileInput.onchange = (e) => {
        if (e.target.files.length) processFile(e.target.files[0]);
    };

    function processFile(file) {
        state.file = file;
        document.getElementById('promptText').style.display = 'none';
        document.getElementById('fileSelected').style.display = 'block';
        document.getElementById('fileSelected').textContent = `📄 ${file.name}`;
        
        const reader = new FileReader();
        reader.onload = (e) => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(sheet, { header: 1 });
            displayPreview(json);
        };
        reader.readAsArrayBuffer(file);
    }

    function displayPreview(data) {
        const wrapper = document.getElementById('tableWrapper');
        const head = document.getElementById('tableHead');
        const body = document.getElementById('tableBody');
        
        head.innerHTML = ''; body.innerHTML = '';
        if (!data.length) return;

        wrapper.style.display = 'block';
        const rows = data.slice(0, 10); // Show first 10 rows
        
        rows.forEach((row, index) => {
            const tr = document.createElement('tr');
            row.forEach(cell => {
                const el = document.createElement(index === 0 ? 'th' : 'td');
                el.textContent = cell || '';
                tr.appendChild(el);
            });
            index === 0 ? head.appendChild(tr) : body.appendChild(tr);
        });
    }

    // 2. Validation Logic
    function validateBalance() {
        const d = parseFloat(elements.dept.value) || 0;
        const c = parseFloat(elements.cash.value) || 0;
        state.isBalanced = d === c && d > 0;

        const text = document.getElementById('balanceText');
        const dot = document.getElementById('balanceDot');
        
        text.textContent = state.isBalanced ? 'متزن ✓' : 'غير متزن';
        text.style.color = state.isBalanced ? 'var(--success)' : 'var(--error)';
        dot.style.background = state.isBalanced ? 'var(--success)' : 'var(--error)';
    }

    elements.dept.oninput = validateBalance;
    elements.cash.oninput = validateBalance;

    // 3. API Submission
    async function handleSubmission() {
        if (!state.file) return alert('الرجاء اختيار ملف أولاً');
        
        const apiUrl = document.getElementById('apiUrl').value.trim();
        const formData = new FormData();
        formData.append('file', state.file);
        formData.append('date', document.getElementById('date').value);
        formData.append('code', document.getElementById('code').value);
        formData.append('code_2', document.getElementById('code2').value);
        formData.append('dept', elements.dept.value);
        formData.append('cash', elements.cash.value);

        setLoading(true);
        hideAlert();

        try {
            const response = await fetch(`${apiUrl}/entry`, {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                const blob = await response.blob();
                const downloadUrl = URL.createObjectURL(blob);
                
                elements.downloadBtn.href = downloadUrl;
                elements.downloadBtn.download = `processed_${state.file.name}`;
                elements.downloadBtn.style.display = 'flex';
                
                showAlert('success', 'تم الترحيل بنجاح', 'يمكنك الآن تحميل الملف الناتج من الخادم.');
            } else {
                const errData = await response.json().catch(() => ({ detail: 'فشل في معالجة الطلب' }));
                showAlert('error', `خطأ في الخادم (${response.status})`, errData.detail);
            }
        } catch (error) {
            showAlert('error', 'فشل الاتصال', 'تعذر الوصول إلى الخادم. تأكد من تشغيل الـ Backend وإعدادات CORS.');
        } finally {
            setLoading(false);
        }
    }

    function setLoading(isLoading) {
        elements.submitBtn.disabled = isLoading;
        document.getElementById('loader').style.display = isLoading ? 'block' : 'none';
        document.getElementById('btnLabel').textContent = isLoading ? 'جاري الترحيل...' : 'تنفيذ عملية الترحيل';
    }

    function showAlert(type, title, msg) {
        elements.alert.style.display = 'block';
        elements.alert.className = `alert alert-${type}`;
        document.getElementById('alertTitle').textContent = title;
        document.getElementById('alertMsg').textContent = msg;
    }

    function hideAlert() {
        elements.alert.style.display = 'none';
    }
</script>
</body>
</html>
