<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام ترحيل القيود الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --border: #e2e8f0;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --success: #10b981;
            --error: #ef4444;
            --radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-main);
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 850px;
            background: var(--bg-card);
            border-radius: var(--radius);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .header {
            padding: 1.5rem 2rem;
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 1.2rem; font-weight: 600; }

        .method-tag {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(255,255,255,0.1);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .url-config {
            padding: 0.9rem 2rem;
            background: #f1f5f9;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .url-config label { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; white-space: nowrap; }
        .url-config input {
            flex: 1;
            background: transparent;
            border: none;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: var(--primary);
            outline: none;
        }

        .form-body { padding: 2rem; }

        .section-title {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin: 1.5rem 0 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }
        .section-title:first-child { margin-top: 0; }
        .section-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }

        /* Upload zone */
        .upload-zone {
            border: 2px dashed var(--border);
            padding: 2rem;
            text-align: center;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.2s;
            background: #fafafa;
        }
        .upload-zone:hover { border-color: var(--primary); background: #f0f7ff; }
        .upload-zone.dragover { border-color: var(--success); background: #ecfdf5; }

        /* Table preview */
        #tableContainer {
            margin-top: 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            overflow: hidden;
            max-height: 260px;
            overflow-y: auto;
        }
        table { width: 100%; border-collapse: collapse; font-size: 0.78rem; text-align: right; }
        th { background: #f8fafc; padding: 10px 12px; border-bottom: 2px solid var(--border); position: sticky; top: 0; font-size: 0.75rem; }
        td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
        tr:last-child td { border-bottom: none; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .input-group { margin-bottom: 0; }

        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; }

        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 11px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-family: inherit;
            font-size: 0.9rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }

        .mono { font-family: 'JetBrains Mono', monospace; }

        .balance-box {
            background: #f8fafc;
            border: 1px solid var(--border);
            padding: 11px 14px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 44px;
        }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }

        /* Buttons */
        .submit-btn {
            width: 100%;
            padding: 13px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1.5rem;
            font-family: inherit;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.2s;
        }
        .submit-btn:hover:not(:disabled) { background: var(--primary-hover); }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .download-btn {
            width: 100%;
            padding: 13px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.75rem;
            font-family: inherit;
            font-size: 1rem;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            transition: background 0.2s;
        }
        .download-btn:hover { background: #059669; }
        .download-btn.visible { display: flex; }

        /* Response area */
        .response {
            margin-top: 1rem;
            padding: 1rem 1.25rem;
            border-radius: 8px;
            display: none;
        }
        .response.success { background: #ecfdf5; color: #065f46; border: 1px solid #6ee7b7; }
        .response.error   { background: #fef2f2; color: #991b1b; border: 1px solid #fca5a5; }
        .response p { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; margin-top: 5px; word-break: break-all; }

        /* Spinner */
        .spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            display: none;
            animation: spin 0.8s linear infinite;
            flex-shrink: 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>إدخال وترحيل القيود المحاسبية</h1>
        <span class="method-tag">UPLOAD + POST</span>
    </div>

    <div class="url-config">
        <label>API</label>
        <input id="apiUrl" type="text" value="http://localhost:8000">
    </div>

    <div class="form-body">

        <!-- File Upload -->
        <div class="section-title">الملف المرفق (Excel)</div>
        <div class="upload-zone" id="dropZone">
            <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none">
            <div id="uploadPrompt">
                <strong>اضغط لرفع ملف</strong> أو اسحب الملف هنا
                <p style="font-size:0.75rem;color:var(--text-muted);margin-top:5px;">يدعم صيغة .xlsx فقط</p>
            </div>
            <div id="fileInfo" style="display:none;color:var(--primary);font-weight:600;"></div>
        </div>

        <div id="tableContainer" style="display:none">
            <table>
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <!-- Entry fields -->
        <div class="section-title">بيانات القيد العامة</div>
        <div class="grid-2" style="margin-bottom:1.2rem">
            <div class="input-group">
                <label>التاريخ</label>
                <input type="text" id="date" placeholder="DD/MM/YYYY" class="mono">
            </div>
            <div class="input-group">
                <label>حالة التوازن</label>
                <div class="balance-box">
                    <span id="balanceText" style="font-size:0.82rem;font-weight:600;color:var(--error)">غير متوازن</span>
                    <span id="balanceDot" class="status-dot" style="background:var(--error)"></span>
                </div>
            </div>
        </div>

        <div class="grid-2" style="margin-bottom:1.2rem">
            <div class="input-group">
                <label>كود الحساب (مدين)</label>
                <input type="text" id="code" placeholder="302001028" class="mono">
            </div>
            <div class="input-group">
                <label>القيمة المدينة</label>
                <input type="number" id="dept" placeholder="0.00" class="mono">
            </div>
        </div>

        <div class="grid-2">
            <div class="input-group">
                <label>كود الحساب (دائن)</label>
                <input type="text" id="code2" placeholder="102003001" class="mono">
            </div>
            <div class="input-group">
                <label>القيمة الدائنة</label>
                <input type="number" id="cash" placeholder="0.00" class="mono">
            </div>
        </div>

        <!-- Actions -->
        <button class="submit-btn" id="submitBtn" onclick="submitEntry()">
            <span class="spinner" id="btnSpinner"></span>
            <span id="btnText">رفع الملف وترحيل القيد</span>
        </button>

        <a class="download-btn" id="downloadBtn" download>
            ⬇ تحميل الملف المعالج
        </a>

        <div id="responseArea" class="response">
            <strong id="resTitle"></strong>
            <p id="resMsg"></p>
        </div>

    </div>
</div>

<script>
    const fileInput   = document.getElementById('fileInput');
    const dropZone    = document.getElementById('dropZone');
    const fileInfo    = document.getElementById('fileInfo');
    const uploadPrompt = document.getElementById('uploadPrompt');
    const deptInput   = document.getElementById('dept');
    const cashInput   = document.getElementById('cash');
    const downloadBtn = document.getElementById('downloadBtn');

    // ── File picking ──────────────────────────────────────────────────────────
    dropZone.onclick = () => fileInput.click();
    dropZone.ondragover  = (e) => { e.preventDefault(); dropZone.classList.add('dragover'); };
    dropZone.ondragleave = ()  => dropZone.classList.remove('dragover');
    dropZone.ondrop = (e) => {
        e.preventDefault(); dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length) { fileInput.files = e.dataTransfer.files; handleFile(e.dataTransfer.files[0]); }
    };
    fileInput.onchange = (e) => { if (e.target.files.length) handleFile(e.target.files[0]); };

    function handleFile(file) {
        fileInfo.textContent = `📄 ${file.name}`;
        fileInfo.style.display = 'block';
        uploadPrompt.style.display = 'none';
        downloadBtn.classList.remove('visible');
        document.getElementById('responseArea').style.display = 'none';
        previewExcel(file);
    }

    // ── Excel preview ─────────────────────────────────────────────────────────
    function previewExcel(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const wb   = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
            const ws   = wb.Sheets[wb.SheetNames[0]];
            renderTable(XLSX.utils.sheet_to_json(ws, { header: 1 }));
        };
        reader.readAsArrayBuffer(file);
    }

    function renderTable(data) {
        const head = document.getElementById('tableHead');
        const body = document.getElementById('tableBody');
        const container = document.getElementById('tableContainer');
        head.innerHTML = ''; body.innerHTML = '';
        if (!data.length) return;
        container.style.display = 'block';
        const trH = document.createElement('tr');
        (data[0] || []).forEach(c => { const th = document.createElement('th'); th.textContent = c ?? ''; trH.appendChild(th); });
        head.appendChild(trH);
        data.slice(1, 16).forEach(row => {
            const tr = document.createElement('tr');
            row.forEach(c => { const td = document.createElement('td'); td.textContent = c ?? ''; tr.appendChild(td); });
            body.appendChild(tr);
        });
    }

    // ── Balance check ─────────────────────────────────────────────────────────
    function checkBalance() {
        const v1 = parseFloat(deptInput.value) || 0;
        const v2 = parseFloat(cashInput.value) || 0;
        const text = document.getElementById('balanceText');
        const dot  = document.getElementById('balanceDot');
        const ok   = v1 === v2 && v1 !== 0;
        text.textContent = ok ? 'متوازن ✓' : 'غير متوازن';
        text.style.color = ok ? 'var(--success)' : 'var(--error)';
        dot.style.background = ok ? 'var(--success)' : 'var(--error)';
    }
    deptInput.oninput = checkBalance;
    cashInput.oninput = checkBalance;

    // ── Submit ────────────────────────────────────────────────────────────────
    async function submitEntry() {
        const btn          = document.getElementById('submitBtn');
        const spinner      = document.getElementById('btnSpinner');
        const btnText      = document.getElementById('btnText');
        const responseArea = document.getElementById('responseArea');
        const base         = document.getElementById('apiUrl').value.replace(/\/$/, '');
        const file         = fileInput.files[0];

        if (!file) { alert('يرجى اختيار ملف Excel أولاً'); return; }

        const formData = new FormData();
        formData.append('file',   file);
        formData.append('date',   document.getElementById('date').value);
        formData.append('code',   document.getElementById('code').value);
        formData.append('code_2', document.getElementById('code2').value);
        formData.append('dept',   deptInput.value);
        formData.append('cash',   cashInput.value);

        btn.disabled = true;
        spinner.style.display = 'inline-block';
        btnText.textContent = 'جاري المعالجة...';
        responseArea.style.display = 'none';
        downloadBtn.classList.remove('visible');

        try {
            const res = await fetch(`${base}/entry`, { method: 'POST', body: formData });

            if (res.ok) {
                // Server returns the processed .xlsx file directly
                const blob = await res.blob();

                // Try to get the filename the server suggested
                const cd = res.headers.get('Content-Disposition') || '';
                const m  = cd.match(/filename\*?=(?:UTF-8'')?["']?([^"';\r\n]+)/i);
                const filename = m ? decodeURIComponent(m[1].trim()) : `processed_${file.name}`;

                // Wire the blob URL to the download button
                const url = URL.createObjectURL(blob);
                downloadBtn.href     = url;
                downloadBtn.download = filename;
                downloadBtn.classList.add('visible');

                responseArea.style.display = 'block';
                responseArea.className = 'response success';
                document.getElementById('resTitle').textContent = 'تم بنجاح ✓';
                document.getElementById('resMsg').textContent   = `الملف جاهز للتحميل: ${filename}`;

            } else {
                let detail = 'حدث خطأ أثناء المعالجة.';
                try { const err = await res.json(); detail = err.detail || JSON.stringify(err); } catch (_) {}
                responseArea.style.display = 'block';
                responseArea.className = 'response error';
                document.getElementById('resTitle').textContent = `خطأ (${res.status})`;
                document.getElementById('resMsg').textContent   = detail;
            }

        } catch (e) {
            responseArea.style.display = 'block';
            responseArea.className = 'response error';
            document.getElementById('resTitle').textContent = 'فشل الاتصال';
            document.getElementById('resMsg').textContent   = 'تأكد من تشغيل الخادم وإعدادات CORS.';
        } finally {
            btn.disabled = false;
            spinner.style.display = 'none';
            btnText.textContent = 'رفع الملف وترحيل القيد';
        }
    }
</script>
</body>
</html>
